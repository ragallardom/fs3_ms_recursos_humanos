services:
  db-rrhh:
    image: postgres:18.3-alpine3.23
    container_name: innovatech-db-rrhh
    environment:
      POSTGRES_USER: user_rrhh
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: rrhh_db
    ports:
      - "5432:5432"
    volumes:
      - rrhh_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_rrhh -d rrhh_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rrhh-network

  ms-rrhh-api:
    build: .
    container_name: innovatech-ms-rrhh
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://innovatech-db-rrhh:5432/rrhh_db
      - SPRING_DATASOURCE_USERNAME=user_rrhh
      - SPRING_DATASOURCE_PASSWORD=admin123
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
    depends_on:
      db-rrhh:
        condition: service_healthy
    networks:
      - rrhh-network

networks:
  rrhh-network:
    driver: bridge

volumes:
  rrhh_data: